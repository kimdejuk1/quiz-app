<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>온라인 시험</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>📝 온라인 시험</h1>
    <div style="display:flex; align-items:center; gap:10px; margin-left:auto;">
      <span class="sub" id="headerName"></span>
      <button class="btn btn-secondary btn-sm" id="btnMyPage" onclick="location.href='student.html'" style="display:none">내 오답노트</button>
      <button class="btn btn-secondary btn-sm" id="btnLogout" onclick="logout()" style="display:none">로그아웃</button>
    </div>
  </header>

  <!-- ── 로그인/회원가입 ── -->
  <div id="authSection">
    <div class="card" style="max-width:440px">
      <div style="display:flex; gap:4px; margin-bottom:20px;">
        <button class="tab-btn active" id="tabLogin" onclick="switchAuthTab('login')" style="border-radius:8px">로그인</button>
        <button class="tab-btn" id="tabSignup" onclick="switchAuthTab('signup')" style="border-radius:8px">회원가입</button>
      </div>

      <!-- 로그인 -->
      <div id="loginForm">
        <div id="loginMsg" class="msg"></div>
        <div class="form-group">
          <label>아이디</label>
          <input type="text" id="loginUsername" placeholder="아이디 입력">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="loginPassword" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') login()">
        </div>
        <button class="btn btn-primary" onclick="login()">로그인</button>
      </div>

      <!-- 회원가입 -->
      <div id="signupForm" style="display:none">
        <div id="signupMsg" class="msg"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px;">
          <div class="form-group" style="margin:0">
            <label>학년</label>
            <input type="number" id="signupGrade" placeholder="1" min="1" max="6">
          </div>
          <div class="form-group" style="margin:0">
            <label>반</label>
            <input type="number" id="signupClass" placeholder="1" min="1" max="20">
          </div>
          <div class="form-group" style="margin:0">
            <label>번호</label>
            <input type="number" id="signupNumber" placeholder="1" min="1" max="50">
          </div>
        </div>
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="signupName" placeholder="이름 입력" maxlength="10">
        </div>
        <div class="form-group">
          <label>아이디 <span style="color:#9ca3af; font-weight:400; font-size:0.8rem">(영문+숫자, 4~16자)</span></label>
          <input type="text" id="signupUsername" placeholder="아이디 입력" maxlength="16">
        </div>
        <div class="form-group">
          <label>비밀번호 <span style="color:#9ca3af; font-weight:400; font-size:0.8rem">(6자 이상)</span></label>
          <input type="password" id="signupPassword" placeholder="비밀번호 입력">
        </div>
        <button class="btn btn-primary" onclick="signup()">회원가입</button>
      </div>
    </div>
  </div>

  <!-- ── 시험 선택 (로그인 후) ── -->
  <div id="quizSection" style="display:none">
    <div class="card">
      <h2>시험 선택</h2>
      <div id="quizMsg" class="msg"></div>

      <!-- Step 1: 선생님 선택 -->
      <div id="teacherStep">
        <label class="form-label">선생님 선택</label>
        <div id="teacherList" class="unit-list">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Step 2: 단원 선택 -->
      <div id="unitStep" style="display:none">
        <label class="form-label">
          <button onclick="backToTeacher()" style="background:none;border:none;color:#1a56db;cursor:pointer;font-size:0.85rem;padding:0;margin-right:6px;">← 다시 선택</button>
          단원 선택 <span id="selectedTeacherName" style="color:#6b7280;font-weight:400;"></span>
        </label>
        <div id="unitList" class="unit-list">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script>
    let selectedTeacherId = null;
    let currentUser = null;
    let studentProfile = null;

    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session) {
        currentUser = session.user;
        await loadStudentProfile();
      } else {
        currentUser = null;
        studentProfile = null;
        showAuth();
      }
    });

    async function loadStudentProfile() {
      const { data } = await supabase
        .from('student_profiles')
        .select('*')
        .eq('id', currentUser.id)
        .single();

      if (!data) { await supabase.auth.signOut(); return; }
      studentProfile = data;
      showQuizSection();
    }

    function showAuth() {
      document.getElementById('authSection').style.display = '';
      document.getElementById('quizSection').style.display = 'none';
      document.getElementById('btnLogout').style.display = 'none';
      document.getElementById('btnMyPage').style.display = 'none';
      document.getElementById('headerName').textContent = '';
    }

    function showQuizSection() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('quizSection').style.display = '';
      document.getElementById('btnLogout').style.display = '';
      document.getElementById('btnMyPage').style.display = '';
      document.getElementById('headerName').textContent =
        `${studentProfile.grade}학년 ${studentProfile.class_num}반 ${studentProfile.number}번 ${studentProfile.name}`;
      loadTeachers();
    }

    // ── 인증 ──────────────────────────────
    function switchAuthTab(tab) {
      document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? '' : 'none';
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
    }

    async function login() {
      const username = document.getElementById('loginUsername').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      if (!username || !password) { showAuthMsg('loginMsg', '아이디와 비밀번호를 입력해주세요.', 'error'); return; }

      const { error } = await supabase.auth.signInWithPassword({
        email: `${username}@student.quiz`,
        password,
      });
      if (error) showAuthMsg('loginMsg', '아이디 또는 비밀번호가 올바르지 않습니다.', 'error');
    }

    async function signup() {
      const grade    = parseInt(document.getElementById('signupGrade').value);
      const classNum = parseInt(document.getElementById('signupClass').value);
      const number   = parseInt(document.getElementById('signupNumber').value);
      const name     = document.getElementById('signupName').value.trim();
      const username = document.getElementById('signupUsername').value.trim().toLowerCase();
      const password = document.getElementById('signupPassword').value;

      if (!grade || !classNum || !number || !name || !username || !password) {
        showAuthMsg('signupMsg', '모든 항목을 입력해주세요.', 'error'); return;
      }
      if (!/^[a-z0-9]{4,16}$/.test(username)) {
        showAuthMsg('signupMsg', '아이디는 영문 소문자+숫자 4~16자로 입력해주세요.', 'error'); return;
      }
      if (password.length < 6) {
        showAuthMsg('signupMsg', '비밀번호는 6자 이상이어야 합니다.', 'error'); return;
      }

      const { data, error } = await supabase.auth.signUp({
        email: `${username}@student.quiz`,
        password,
      });
      if (error) {
        showAuthMsg('signupMsg', error.message.includes('already') ? '이미 사용 중인 아이디입니다.' : error.message, 'error');
        return;
      }

      const { error: profileErr } = await supabase.from('student_profiles').insert({
        id: data.user.id,
        username,
        name,
        grade,
        class_num: classNum,
        number,
      });
      if (profileErr) {
        showAuthMsg('signupMsg', '프로필 저장 실패: ' + profileErr.message, 'error');
        await supabase.auth.signOut();
        return;
      }
      showAuthMsg('signupMsg', '가입 완료! 로그인해주세요.', 'success');
      switchAuthTab('login');
    }

    async function logout() {
      await supabase.auth.signOut();
    }

    // ── 시험 선택 ─────────────────────────
    async function loadTeachers() {
      document.getElementById('teacherStep').style.display = '';
      document.getElementById('unitStep').style.display = 'none';
      selectedTeacherId = null;

      const { data } = await supabase.from('profiles').select('id, display_name').order('display_name');
      const list = document.getElementById('teacherList');

      if (!data?.length) {
        list.innerHTML = '<p class="empty">등록된 선생님이 없습니다.</p>';
        return;
      }
      list.innerHTML = data.map(t => `
        <button class="unit-btn" onclick="selectTeacher('${t.id}', '${t.display_name.replace(/'/g,"\\'")}')">
          👨‍🏫 ${t.display_name}
        </button>
      `).join('');
    }

    async function selectTeacher(teacherId, teacherName) {
      selectedTeacherId = teacherId;
      document.getElementById('selectedTeacherName').textContent = `— ${teacherName}`;
      document.getElementById('teacherStep').style.display = 'none';
      document.getElementById('unitStep').style.display = '';
      document.getElementById('unitList').innerHTML = '<div class="spinner"></div>';

      const { data } = await supabase
        .from('problems').select('unit')
        .eq('teacher_id', teacherId).order('unit');

      const units = [...new Set((data||[]).map(r => r.unit))];
      const list = document.getElementById('unitList');

      if (!units.length) { list.innerHTML = '<p class="empty">등록된 문제가 없습니다.</p>'; return; }

      // 오답이 있는 단원 확인
      const { data: wrongData } = await supabase
        .from('problem_results')
        .select('unit')
        .eq('student_id', currentUser.id)
        .eq('teacher_id', teacherId)
        .eq('is_correct', false);
      const wrongUnits = new Set((wrongData||[]).map(r => r.unit));

      list.innerHTML = units.map(u => `
        <div class="unit-row">
          <button class="unit-btn" style="flex:1" onclick="startQuiz('${u.replace(/'/g,"\\'")}', 'normal')">
            📖 ${u}
          </button>
          ${wrongUnits.has(u) ? `
          <button class="btn btn-secondary btn-sm wrong-btn" onclick="startQuiz('${u.replace(/'/g,"\\'")}', 'wrong')"
            title="틀린 문항만 풀기">❌ 오답만</button>
          ` : ''}
        </div>
      `).join('');
    }

    function backToTeacher() {
      selectedTeacherId = null;
      document.getElementById('unitStep').style.display = 'none';
      document.getElementById('teacherStep').style.display = '';
    }

    function startQuiz(unit, mode) {
      sessionStorage.setItem('studentId', currentUser.id);
      sessionStorage.setItem('studentName', studentProfile.name);
      sessionStorage.setItem('studentInfo', JSON.stringify(studentProfile));
      sessionStorage.setItem('selectedUnit', unit);
      sessionStorage.setItem('teacherId', selectedTeacherId);
      sessionStorage.setItem('quizMode', mode);
      location.href = 'quiz.html';
    }

    function showAuthMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type} show`;
    }
  </script>
</body>
</html>
